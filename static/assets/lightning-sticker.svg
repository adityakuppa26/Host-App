<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="Animated lightning sticker">
  <defs>
    <linearGradient id="bolt" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff06a"/>
      <stop offset=".55" stop-color="#ffcc4d"/>
      <stop offset="1" stop-color="#12a594"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ffcc4d" flood-opacity=".75"/>
    </filter>
  </defs>
  <circle cx="110" cy="110" r="78" fill="#071b29" opacity=".82"/>
  <path d="M128 18 L50 118 h50 l-20 84 90-114 h-52z" fill="url(#bolt)" filter="url(#glow)">
    <animateTransform attributeName="transform" type="scale" values="1;1.08;1" dur=".72s" repeatCount="indefinite" additive="sum"/>
  </path>
  <g fill="none" stroke="#f6fbff" stroke-width="6" stroke-linecap="round" opacity=".8">
    <path d="M38 58 h32">
      <animate attributeName="opacity" values=".15;1;.15" dur=".55s" repeatCount="indefinite"/>
    </path>
    <path d="M150 162 h34">
      <animate attributeName="opacity" values="1;.15;1" dur=".62s" repeatCount="indefinite"/>
    </path>
    <path d="M168 62 h20">
      <animate attributeName="opacity" values=".2;1;.2" dur=".48s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
