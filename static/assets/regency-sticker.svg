<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="Animated regency letter and fan sticker">
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff8e8"/>
      <stop offset="1" stop-color="#f1d9a5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#22162a" flood-opacity=".34"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <path d="M38 74 h144 v96 h-144z" rx="12" fill="url(#paper)"/>
    <path d="M38 76 l72 52 72-52" fill="none" stroke="#b94f55" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="110" cy="122" r="18" fill="#b94f55"/>
    <path d="M100 122 h20" stroke="#f5b84b" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g transform="translate(108 96)">
    <animateTransform attributeName="transform" type="rotate" values="-7 0 70;7 0 70;-7 0 70" dur="1.8s" repeatCount="indefinite"/>
    <path d="M0 88 C18 32 45 10 86 0 C78 42 50 72 0 88Z" fill="#f5b84b"/>
    <path d="M0 88 C34 42 64 24 86 0" stroke="#fff8e8" stroke-width="5" fill="none"/>
    <path d="M0 88 C22 50 28 28 30 12" stroke="#fff8e8" stroke-width="4" fill="none" opacity=".8"/>
    <path d="M0 88 C46 54 58 28 60 5" stroke="#fff8e8" stroke-width="4" fill="none" opacity=".8"/>
  </g>
  <g fill="#fff8e8">
    <circle cx="46" cy="44" r="6">
      <animate attributeName="opacity" values=".2;1;.2" dur="1.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="172" cy="42" r="5">
      <animate attributeName="opacity" values="1;.25;1" dur="1.7s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
