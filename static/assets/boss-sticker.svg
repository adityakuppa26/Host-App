<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="Animated boss sticker">
  <defs>
    <radialGradient id="body" cx="50%" cy="42%" r="60%">
      <stop offset="0" stop-color="#41b883"/>
      <stop offset=".65" stop-color="#1d7058"/>
      <stop offset="1" stop-color="#123a32"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="9" flood-color="#06110f" flood-opacity=".42"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <ellipse cx="110" cy="118" rx="72" ry="64" fill="url(#body)">
      <animate attributeName="ry" values="64;58;64" dur=".9s" repeatCount="indefinite"/>
    </ellipse>
    <path d="M52 88 l-28-40 48 16" fill="#f7c948"/>
    <path d="M168 88 l28-40-48 16" fill="#f7c948"/>
    <circle cx="84" cy="104" r="13" fill="#fff8e8"/>
    <circle cx="136" cy="104" r="13" fill="#fff8e8"/>
    <circle cx="88" cy="108" r="6" fill="#111318"/>
    <circle cx="132" cy="108" r="6" fill="#111318"/>
    <path d="M76 146 C96 164 124 164 144 146" stroke="#fff8e8" stroke-width="9" stroke-linecap="round" fill="none"/>
  </g>
  <g stroke="#f7c948" stroke-width="7" stroke-linecap="round">
    <path d="M34 132 h-18">
      <animate attributeName="opacity" values=".1;1;.1" dur=".7s" repeatCount="indefinite"/>
    </path>
    <path d="M186 132 h18">
      <animate attributeName="opacity" values="1;.1;1" dur=".7s" repeatCount="indefinite"/>
    </path>
